# Toolchain pins for the Hijau monorepo. Run `mise install` to provision.
# goose is consumed as a Go library (embedded migrations), not a CLI tool.
# Bun is the sole JS/TS runtime + package manager + script runner — no Node.
# (Verified: `bun run check`/`build`/`dev` drive vite + sveltekit + svelte-check.)
[tools]
go = "1.26.0"
bun = "1.3.13"
sqlc = "1.30.0"
# moon is the monorepo task runner (per-project moon.yml). Pinned via the aqua
# backend so `mise install` provisions it too.
"aqua:moonrepo/moon" = "2.1.1"
