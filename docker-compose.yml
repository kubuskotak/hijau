# Hijau self-hosted stack: Postgres + the app (a single Go server that serves
# the REST API and the built SPA on one port).
#   Prebuilt:    docker compose pull && docker compose up -d   (pulls from GHCR)
#   From source: docker compose up --build                      (builds locally)
# Then open http://localhost:8080.
services:
  app:
    # Prebuilt multi-arch image from GHCR (override the tag with HIJAU_TAG, e.g.
    # HIJAU_TAG=v0.1.0). `build` is kept so `--build` still builds from source.
    image: ghcr.io/kubuskotak/hijau:${HIJAU_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://hijau:hijau@postgres:5432/hijau?sslmode=disable
      PORT: "8080"
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-me}
      HIJAU_ENCRYPTION_KEY: ${HIJAU_ENCRYPTION_KEY:-dev-encryption-key-change-me-32b}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    ports:
      - "8080:8080"   # API + SPA served together
    volumes:
      - appdata:/app/data   # screenshots and other uploads
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hijau
      POSTGRES_PASSWORD: hijau
      POSTGRES_DB: hijau
    ports:
      - "5433:5432"   # host 5433 to avoid colliding with a local Postgres on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hijau -d hijau"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  appdata:
